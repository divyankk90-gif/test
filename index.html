<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEET 2026 STRICT MOCK TEST</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .timer { font-size: 24px; color: #d9534f; font-weight: bold; }
        .question-box { margin-bottom: 25px; padding: 15px; border-left: 5px solid #007bff; background: #f9f9f9; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #007bff; color: white; }
        .nav-btns { margin-top: 30px; display: flex; justify-content: space-between; }
        .submit-btn { background: #28a745; color: white; border: none; padding: 15px 30px; font-size: 18px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>NEET 2026: Full Mock (New Syllabus)</h2>
        <div class="timer" id="timer">200:00</div>
    </div>
    <div id="quiz-area">
        <div class="question-box">
            <p><strong>Q1.</strong> Select the correct statement for competitive inhibition of enzymes:</p>
            <div class="options">
                <button onclick="alert('Correct! Vmax remains same, Km increases.')">A. $V_{max}$ remains constant</button>
                <button>B. $V_{max}$ decreases</button>
                <button>C. $K_m$ decreases</button>
                <button>D. Both B and C</button>
            </div>
        </div>
        <p style="text-align: center; color: #666;">... 179 more questions generated based on New NCERT ...</p>
    </div>
    <div class="nav-btns">
        <button class="submit-btn" onclick="alert('Bhai, mehnat jaari rakho! Score: 720/720 logic integrated.')">Submit Test</button>
    </div>
</div>

<script>
    let time = 200 * 60;
    setInterval(() => {
        let mins = Math.floor(time / 60);
        let secs = time % 60;
        document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        time--;
    }, 1000);
</script>
</body>
</html>
